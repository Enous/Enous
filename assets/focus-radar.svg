<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08142D"/>
      <stop offset="1" stop-color="#173D83"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7EA5FF"/>
      <stop offset="1" stop-color="#C6D6FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" rx="18" fill="url(#bg)"/>
  <text x="36" y="34" fill="#DCE7FF" font-family="Consolas, monospace" font-size="19">ODAK RADARI</text>

  <g transform="translate(210 120)">
    <circle r="70" stroke="#6F97FF" stroke-opacity="0.35" fill="none"/>
    <circle r="48" stroke="#6F97FF" stroke-opacity="0.35" fill="none"/>
    <circle r="26" stroke="#6F97FF" stroke-opacity="0.35" fill="none"/>
    <line x1="-85" y1="0" x2="85" y2="0" stroke="#6F97FF" stroke-opacity="0.3"/>
    <line x1="0" y1="-85" x2="0" y2="85" stroke="#6F97FF" stroke-opacity="0.3"/>

    <g>
      <line x1="0" y1="0" x2="68" y2="0" stroke="url(#ring)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="68" cy="0" r="5" fill="#DDE8FF"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </g>
  </g>

  <rect x="380" y="56" width="760" height="132" rx="14" fill="#0E2451" stroke="#7EA5FF"/>
  <text x="412" y="89" fill="#B7CCFF" font-family="Consolas, monospace" font-size="14">ODAK ALANLARI</text>

  <text x="412" y="122" fill="#EAF0FF" font-family="Consolas, monospace" font-size="16">• Frontend deneyimi ve etkileşim</text>
  <text x="412" y="148" fill="#EAF0FF" font-family="Consolas, monospace" font-size="16">• Backend mimarisi ve otomasyon akışları</text>
  <text x="412" y="174" fill="#EAF0FF" font-family="Consolas, monospace" font-size="16">• Üretim kalitesi, test ve sürdürülebilirlik</text>
</svg>
